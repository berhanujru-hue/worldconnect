<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worldconnect AI - Super App</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #00ffaa; --bg: #0b0f1a; --card: #161e2e; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Glassmorphism Header */
        header { padding: 15px 25px; background: rgba(22, 30, 46, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .controls { display: flex; gap: 12px; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1f2937; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        #join-btn { background: var(--primary); color: #000; }
        #join-btn:hover { background: var(--secondary); transform: scale(1.05); }
        #leave-btn { background: #ff4757; color: white; display: none; }

        /* Super App Layout */
        main { display: flex; flex: 1; height: calc(100vh - 70px); }
        
        /* Video Engine */
        #video-grid { flex: 3; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: radial-gradient(circle at center, #111827, #000); position: relative; }
        .video-wrapper { background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-size: 12px; z-index: 10; backdrop-filter: blur(5px); }

        /* Multilingual AI Sidebar */
        #ai-chat { flex: 1; background: var(--card); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; width: 350px; }
        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; max-width: 85%; }
        .user-bubble { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-bubble { background: #2d3748; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        .input-area { padding: 20px; background: #1f2937; display: flex; gap: 10px; }
        #user-input { flex: 1; }

        @media (max-width: 1000px) { main { flex-direction: column; } #ai-chat { width: 100%; height: 40%; } #video-grid { flex: 1; grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo">worldconnect AI</div>
    <div class="controls">
        <input type="text" id="room-id" placeholder="Room Name" value="Global_Room">
        <select id="target-lang">
            <option value="English">English</option>
            <option value="Amharic">Amharic</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="Arabic">Arabic</option>
        </select>
        <button id="join-btn">Go Live</button>
        <button id="leave-btn">End Call</button>
    </div>
</header>

<main>
    <div id="video-grid">
        <div id="local-player" class="video-wrapper"><div class="video-label">My Camera</div></div>
        <div id="remote-player" class="video-wrapper"><div class="video-label">Remote Partner</div></div>
    </div>

    <div id="ai-chat">
        <div class="sidebar-header">
            <span>Multilingual AI</span>
            <span style="color:var(--secondary); font-size:10px;">● Active</span>
        </div>
        <div id="chat-window">
            <div class="bubble ai-bubble">Welcome to worldconnect. I can translate your voice and chat into any language. How can I assist?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type message or ask AI...">
            <button id="send-btn" style="background:var(--secondary); color:black;">Send</button>
        </div>
    </div>
</main>

<script>
    // --- CONFIGURATION ---
    const AGORA_APP_ID = "295d2b0fa635427a8255b2260580ac45"; 
    const GEMINI_API_KEY = "AIzaSyCk7PQ0bdEHdBORFVpcrm2uC9x-9AcqHU0"; 
    
    let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let localTracks = { videoTrack: null, audioTrack: null };

    // --- VIDEO ENGINE ---
    async function startExperience() {
        const room = document.getElementById('room-id').value;
        try {
            await client.join(AGORA_APP_ID, room, null, null);
            [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
            
            localTracks.videoTrack.play("local-player");
            await client.publish([localTracks.audioTrack, localTracks.videoTrack]);

            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            addChatBubble("ai", "Connected to " + room + ". You are now live globally.");
        } catch (err) {
            console.error(err);
            alert("Connection error. Ensure your Agora App ID is correct.");
        }
    }

    async function stopExperience() {
        for (let trackName in localTracks) {
            let track = localTracks[trackName];
            if (track) { track.stop(); track.close(); localTracks[trackName] = null; }
        }
        await client.leave();
        document.getElementById('join-btn').style.display = 'inline-block';
        document.getElementById('leave-btn').style.display = 'none';
        document.getElementById('remote-player').innerHTML = '<div class="video-label">Remote Partner</div>';
        addChatBubble("ai", "Call ended.");
    }

    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === "video") { user.videoTrack.play("remote-player"); }
        if (mediaType === "audio") { user.audioTrack.play(); }
    });

    // --- MULTILINGUAL AI ENGINE ---
    async function talkToAI() {
        const text = document.getElementById('user-input').value;
        const lang = document.getElementById('target-lang').value;
        if (!text) return;

        addChatBubble("user", text);
        document.getElementById('user-input').value = "";

        // The logic for Real-Time Translation & AI Response
        const prompt = `User says: "${text}". You are a worldconnect AI assistant. 
                        If the user asks to translate, translate to ${lang}. 
                        Otherwise, reply helpfully in ${lang}. Keep it short.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            addChatBubble("ai", aiReply);
        } catch (e) {
            addChatBubble("ai", "I'm ready to translate, but you need to add your Gemini API Key to the code to activate my brain!");
        }
    }

    function addChatBubble(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `bubble ${role}-bubble`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('join-btn').onclick = startExperience;
    document.getElementById('leave-btn').onclick = stopExperience;
    document.getElementById('send-btn').onclick = talkToAI;
</script>

</body>
</html>
