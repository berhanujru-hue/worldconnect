<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>worldconnect | Global 🌍</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.24.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wa-green: #128C7E; --bg: #f0f2f5; --white: #ffffff; --admin: #d32f2f; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--white); z-index: 1000; position: fixed; width: 100%; text-align: center; }
        .header { background: var(--wa-green); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tab-bar { background: var(--wa-green); display: flex; color: rgba(255,255,255,0.7); font-weight: bold; font-size: 14px; }
        .tab { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; border-bottom: 4px solid transparent; }
        .tab.active { color: white; border-bottom: 4px solid white; }
        #video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; margin-top: 15px; display: none; overflow: hidden; position: relative; }
        #local-player { width: 100%; height: 100%; position: absolute; }
        .call-controls { display: none; gap: 10px; margin-top: 10px; justify-content: center; }
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 85%; max-width: 320px; }
        .btn-call { background: var(--wa-green); color: white; }
        .btn-hangup { background: var(--admin); color: white; width: 120px; }
        .footer { background: white; border-top: 1px solid #eee; display: flex; padding: 12px 0 30px 0; justify-content: space-around; font-size: 12px; color: #666; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1 style="color:var(--wa-green)">worldconnect</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-call" onclick="login()">Login / Sign Up</button>
        <p onclick="adminMode()" style="font-size:12px; color:#999; margin-top:10px;">Owner Portal</p>
    </div>
    <div id="main-app" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <b id="app-title">worldconnect</b>
            <span id="owner-badge" style="background:red; padding:2px 5px; border-radius:4px; font-size:10px; display:none;">OWNER</span>
        </div>
        <div class="tab-bar">
            <div class="tab active" id="t-chats" onclick="showPage('chats')">CHATS</div>
            <div class="tab" id="t-calls" onclick="showPage('calls')">CALLS</div>
        </div>
        <div class="content">
            <div id="page-chats" class="page active">
                <div id="chat-list" style="height:300px; background:#ddd; border-radius:10px; overflow-y:auto; padding:10px; margin-bottom:10px;"></div>
                <input type="text" id="m-in" placeholder="Message..." style="width:70%;">
                <button onclick="send()" class="btn-call" style="width:20%; padding:10px;">Send</button>
            </div>
            <div id="page-calls" class="page">
                <button id="join-btn" class="btn btn-call" onclick="joinCall()">🎥 Start Global Call</button>
                <div id="video-container"><div id="local-player"></div></div>
                <div class="call-controls" id="controls">
                    <button class="btn btn-hangup" onclick="leaveCall()">🔴 Hang Up</button>
                </div>
            </div>
        </div>
        <div class="footer">
            <span onclick="alert('Connected')">Status</span>
            <span onclick="openSet()" id="set-btn">Settings ⚙️</span>
        </div>
    </div>
    <div id="set-modal" class="modal" onclick="closeSet()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="set-lang-title">Language / ቋንቋ</h3>
            <select onchange="setLang(this.value)" style="width:100%; padding:10px; border-radius:8px;">
                <option value="en">English</option>
                <option value="am">Amharic (አማርኛ)</option>
                <option value="es">Español</option>
            </select>
            <button class="btn" style="background:#eee; margin-top:15px;" onclick="closeSet()">Close</button>
        </div>
    </div>
    <script>
        const APP_ID = "eeeb1a064e584642bbb7b1f9040689c3"; 
        const SB_URL = "https://uyhtzjhdepkgrxqgjwma.supabase.co";    
        const SB_KEY = "uyhtzjhdepkgrxqgjwma";    

        const supabase = libSupabase.createClient(SB_URL, SB_KEY);
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { error } = await supabase.auth.signInWithPassword({ email:e, password:p });
            if(error) await supabase.auth.signUp({ email:e, password:p });
            enter();
        }
        function adminMode() { if(prompt("Owner Code:") === "OWNER123") { document.getElementById('owner-badge').style.display="block"; enter(); } }
        function enter() { document.getElementById('auth-screen').style.display="none"; document.getElementById('main-app').style.display="flex"; }
        async function joinCall() {
            try {
                await client.join(APP_ID, "global-room", null, null);
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                document.getElementById('video-container').style.display = "block";
                document.getElementById('join-btn').style.display = "none";
                document.getElementById('controls').style.display = "flex";
                localTracks.videoTrack.play("local-player");
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
            } catch (err) { alert("Enable Camera!"); }
        }
        async function leaveCall() {
            for (let name in localTracks) { if (localTracks[name]) { localTracks[name].stop(); localTracks[name].close(); localTracks[name] = null; } }
            await client.leave();
            document.getElementById('video-container').style.display = "none";
            document.getElementById('join-btn').style.display = "block";
            document.getElementById('controls').style.display = "none";
        }
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('t-'+id).classList.add('active');
        }
        function openSet() { document.getElementById('set-modal').style.display="flex"; }
        function closeSet() { document.getElementById('set-modal').style.display="none"; }
        const langs = {
            en: { chat: "CHATS", call: "CALLS", head: "worldconnect" },
            am: { chat: "ውይይቶች", call: "ጥሪዎች", head: "ወርልድ ኮኔክት" },
            es: { chat: "CHATS", call: "LLAMADAS", head: "Mundo" }
        };
        function setLang(l) {
            document.getElementById('t-chats').innerText = langs[l].chat;
            document.getElementById('t-calls').innerText = langs[l].call;
            document.getElementById('app-title').innerText = langs[l].head;
            closeSet();
        }
        function send() {
            const val = document.getElementById('m-in').value;
            if(!val) return;
            document.getElementById('chat-list').innerHTML += `<div><b>Me:</b> ${val}</div>`;
            document.getElementById('m-in').value = "";
        }
    </script>
</body>
</html>
