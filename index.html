<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>worldconnect AI 🌍</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.24.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --wa-green: #128C7E; --bg: #f0f2f5; --white: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #f0f2f5; }

        .app-shell { 
            max-width: 420px; 
            margin: 0 auto; 
            height: 100vh; 
            background: var(--white); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #auth-page { padding: 40px 25px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .world-icon { font-size: 70px; margin-bottom: 10px; }
        h1 { color: var(--wa-green); margin: 0; font-size: 28px; letter-spacing: -1px; }
        .tagline { color: #888; font-size: 13px; margin-bottom: 35px; }

        /* THE SMART INPUT */
        .input-box { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            background: #fafafa;
        }

        /* BUTTON GROUP */
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-login { background: var(--wa-green); color: white; }
        .btn-signup { background: #e8f5e9; color: var(--wa-green); border: 1px solid var(--wa-green); }

        #main-app { display: none; height: 100%; flex-direction: column; text-align: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- AUTH SECTION -->
        <div id="auth-page">
            <div class="world-icon">🌍</div>
            <h1>worldconnect</h1>
            <p class="tagline">Universal AI & Video Super-App</p>

            <input type="text" id="user-id" class="input-box" placeholder="Email or Phone Number">
            <input type="password" id="user-pass" class="input-box" placeholder="Password">
            
            <div class="btn-row">
                <button class="btn btn-login" onclick="handleAuth('login')">Login</button>
                <button class="btn btn-signup" onclick="handleAuth('signup')">Sign Up</button>
            </div>
            
            <p onclick="founderEntry()" style="font-size:10px; color:#eee; margin-top:50px; cursor:pointer;">Founder Portal</p>
        </div>

        <!-- MAIN APP (Placeholder for testing) -->
        <div id="main-app">
            <h2 style="color:var(--wa-green)">Success!</h2>
            <p>Welcome to worldconnect AI.</p>
            <button class="btn btn-login" style="width:150px; margin: 0 auto;" onclick="location.reload()">Logout</button>
        </div>

    </div>

    <script>
        // --- PUT YOUR KEYS HERE ---
        const AGORA_ID = "eeeb1a064e584642bbb7b1f9040689c3"; 
        const SB_URL = "https://uyhtzjhdepkgrxqgjwma.supabase.co";    
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5aHR6amhkZXBrZ3J4cWdqd21hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTQzMjMsImV4cCI6MjA5MDA3MDMyM30.3OLgsxKKOOeS1PoD5NxcZ-VU6zwrt5A629ipJb79vxo";    

        const supabase = libSupabase.createClient(SB_URL, SB_KEY);

        async function handleAuth(type) {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;

            if(!id || !pass) return alert("Please fill in the details");

            // AI Logic: Detect if the user typed an email or phone
            const isEmail = id.includes('@');
            const credentials = isEmail ? { email: id, password: pass } : { phone: id, password: pass };

            if(type === 'signup') {
                const { error } = await supabase.auth.signUp(credentials);
                if(error) alert(error.message); else enter();
            } else {
                const { error } = await supabase.auth.signInWithPassword(credentials);
                if(error) alert(error.message); else enter();
            }
        }

        function founderEntry() {
            if(prompt("Founder Code:") === "OWNER123") enter();
        }

        function enter() {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }
    </script>
</body>
</html>
