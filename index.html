<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>worldconnect AI 🌍</title>
    
    <!-- Libraries -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.24.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #3b82f6; --secondary: #2dd4bf; --bg: #f8fafc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); }
        .app-shell { max-width: 400px; margin: 0 auto; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 35px; text-align: center; }
        
        /* 1. THE PERFECT TRANSPARENT WORLD LOGO */
        .logo { 
            width: 120px; 
            height: 120px; 
            margin-bottom: 15px; 
            border-radius: 50%; 
            object-fit: contain;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.1));
        }
        
        h1 { margin: 0; letter-spacing: -1.5px; color: #1e293b; font-weight: 800; font-size: 28px; }
        
        /* 2. MODERN COMBINED INPUT */
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.2s ease; 
            background: #fdfdfd; 
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        .btn-group { width: 100%; margin-top: 25px; }
        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 12px; 
            color: white; 
            transition: 0.3s; 
        }
        
        .btn-signup { background: var(--secondary); }
        .btn-login { background: var(--primary); }
        button:active { transform: scale(0.98); }
        
        .toggle-text { margin-top: 20px; font-size: 14px; color: #64748b; }
        .toggle-text span { color: var(--primary); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="container">
        <!-- New Transparent High-Quality Globe -->
        <img src="https://cdn-icons-png.flaticon.com/512/3843/3843033.png" class="logo" alt="World Logo">
        
        <h1>worldconnect</h1>
        <p style="color:#64748b; font-size:15px; margin-bottom:35px;">AI & Video Super-App</p>

        <input type="text" id="user-identifier" placeholder="Email or Phone Number">
        <input type="password" id="password" placeholder="Password">

        <div class="btn-group">
            <button id="submit-btn" class="btn-signup">Sign Up</button>
        </div>

        <p class="toggle-text" id="toggle-mode">Already have an account? <span>Login</span></p>
    </div>
</div>

<script>
    // --- INSERT YOUR KEYS HERE ---
    const SUPABASE_URL = 'https://uyhtzjhdepkgrxqgjwma.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5aHR6amhkZXBrZ3J4cWdqd21hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTQzMjMsImV4cCI6MjA5MDA3MDMyM30.3OLgsxKKOOeS1PoD5NxcZ-VU6zwrt5A629ipJb79vxo';
    const AGORA_APP_ID = '5920000068ae49eea6e5a4fb5675d8c3'; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = false;

    // Toggle between Login and Signup
    document.getElementById('toggle-mode').onclick = () => {
        isLoginMode = !isLoginMode;
        const btn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-mode');

        if (isLoginMode) {
            btn.textContent = 'Login';
            btn.className = 'btn-login';
            toggleText.innerHTML = "Don't have an account? <span>Sign Up</span>";
        } else {
            btn.textContent = 'Sign Up';
            btn.className = 'btn-signup';
            toggleText.innerHTML = "Already have an account? <span>Login</span>";
        }
    };

    // Form Handling
    document.getElementById('submit-btn').onclick = async () => {
        const identifier = document.getElementById('user-identifier').value.trim();
        const password = document.getElementById('password').value;

        if (!identifier || !password) return alert("Please enter your details!");

        try {
            const isEmail = identifier.includes('@');
            const authData = isEmail ? { email: identifier, password } : { phone: identifier, password };

            if (isLoginMode) {
                const { error } = await supabaseClient.auth.signInWithPassword(authData);
                if (error) throw error;
                alert("Welcome back!");
            } else {
                const { error } = await supabaseClient.auth.signUp(authData);
                if (error) throw error;
                alert("Sign Up Successful! Please check your verification.");
            }
        } catch (err) {
            alert(err.message);
        }
    };
</script>

</body>
</html>
