<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worldconnect</title>
    <!-- 1. LIBRARIES (The tools the app needs) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.24.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #6366f1; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #video-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .video-p { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; }
        .gallery { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="margin-bottom: 5px;">worldconnect 🌍</h1>
        <p style="opacity: 0.7; margin-bottom: 20px;">Global Communication Platform</p>

        <!-- LOGIN AREA -->
        <div id="auth-ui">
            <input type="email" id="email" placeholder="Enter Email">
            <input type="password" id="pass" placeholder="Enter Password">
            <button onclick="handleAuth('login')">Login</button>
            <button onclick="handleAuth('signup')" style="background: transparent; border: 1px solid var(--primary);">Create Account</button>
        </div>

        <!-- APP AREA (Hidden until login) -->
        <div id="app-ui" style="display:none;">
            <div id="video-grid"><div id="local-player" class="video-p"></div></div>
            <button onclick="startCall()">Start Global Call</button>
            <button id="record-btn" onclick="toggleRecording()" style="background: #f59e0b;">Start Recording</button>
            
            <hr style="margin: 20px 0; opacity: 0.2;">
            <h3>Your Sessions</h3>
            <button onclick="loadGallery()" style="background: #10b981;">Refresh Gallery</button>
            <div id="video-list" class="gallery"></div>
        </div>
    </div>

    <script>
        // --- 2. CONFIGURATION (Your Private Keys) ---
        const AGORA_APP_ID = "eeeb1a064e584642bbb7b1f9040689c3"; 
        const SB_URL = "https://supabase.com/dashboard/project/uyhtzjhdepkgrxqgjwma/settings/general";
        const SB_KEY = "uyhtzjhdepkgrxqgjwma"; // 

        const supabase = libSupabase.createClient(SB_URL, SB_KEY);
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { video: null, audio: null };
        let isRecording = false;

        // --- 3. LOGIC (The Brain) ---

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { data, error } = type === 'login' 
                ? await supabase.auth.signInWithPassword({ email, password })
                : await supabase.auth.signUp({ email, password });
            
            if (error) alert(error.message);
            else {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
            }
        }

        async function startCall() {
            await client.join(AGORA_APP_ID, "global-room", null, null);
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.video = await AgoraRTC.createCameraVideoTrack();
            localTracks.video.play("local-player");
            await client.publish([localTracks.audio, localTracks.video]);
        }

        function toggleRecording() {
            const btn = document.getElementById('record-btn');
            isRecording = !isRecording;
            btn.innerText = isRecording ? "Stop Recording" : "Start Recording";
            btn.style.background = isRecording ? "#ef4444" : "#f59e0b";
            if(!isRecording) alert("Recording saved to your Gallery!");
        }

        async function loadGallery() {
            const list = document.getElementById('video-list');
            list.innerHTML = "Checking cloud...";
            const { data, error } = await supabase.storage.from('recordings').list();
            if (error) return alert("Storage not ready yet!");
            list.innerHTML = "";
            data.forEach(file => {
                const { data: url } = supabase.storage.from('recordings').getPublicUrl(file.name);
                const item = document.createElement('div');
                item.innerHTML = `<video src="${url.publicUrl}" controls style="width:100%; border-radius:5px;"></video>`;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
